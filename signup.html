<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SmartFit</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Page layout */
        .signup-container {
            min-height: 100vh;
        }

        .form-section {
            background-color: #0d1b2a;
            color: rgb(124, 19, 19);
            padding: 40px;
        }

        .image-section {
            background: url('https://via.placeholder.com/600x800') center/cover no-repeat;
        }

        .signup-card {
            background: #1b263b;
            padding: 30px;
            border-radius: 10px;
        }

        input {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<!--  NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">SmartFit</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

                <li class="nav-item"><a class="nav-link active" href="signup.html">Sign Up</a></li>

            </ul>
        </div>
    </div>
</nav>

<!--  MAIN SIGNUP SECTION -->
<div class="container-fluid signup-container d-flex justify-content-center align-items-center">

    <div class="signup-card text-center">

        <h2 class="mb-3">Create Account</h2>
        <p>Join SmartFit Tech Gym</p>

        <form onsubmit="return validateForm()">

            <input type="text" id="name" class="form-control" placeholder="Full Name" required>

            <input type="email" class="form-control" placeholder="Email" required>

            <input type="password" class="form-control" placeholder="Password" required>

            <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>

        </form>

        <p class="mt-3">
            Already have an account? <a href="login.html">Login</a>
        </p>

    </div>

</div>
<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
