<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartFit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Custom styles for the login page */
        .login-container {
            min-height: 100vh;
        }

        .login-card {
            background: #1b263b;
            padding: 30px;
            border-radius: 10px;
        }

        input {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">SmartFit</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="login.html">Login</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- MAIN LOGIN SECTION -->
<div class="container-fluid login-container d-flex justify-content-center align-items-center">

    <div class="login-card text-center">

        <h2 class="mb-3 text-white">Welcome Back</h2>
        <p class="text-white">Login to your account</p>

        <form>

            <input type="email" class="form-control" placeholder="Email" required>

            <input type="password" class="form-control" placeholder="Password" required>

            <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>

        </form>

        <p class="mt-3 text-white">
            Dont have an account? <a href="signup.html">Sign Up</a>
        </p>

    </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
